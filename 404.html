<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница в разработке | ААИ ЮФУ</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Montserrat Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-blue: #080D6B;
            --secondary-pink: #ED1160;
            --dark-grey: #232328;
            --white: #ffffff;
            --gradient-dark: linear-gradient(45deg, #131313, var(--primary-blue));
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--gradient-dark);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .construction-card {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            padding: 3rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 700px;
            width: 100%;
            color: var(--dark-grey);
            transition: transform 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .construction-card:hover {
            transform: translateY(-5px);
        }

        .icon-wrapper {
            font-size: 5rem;
            line-height: 1;
            color: var(--secondary-pink);
            margin-bottom: 1rem;
        }

        .icon-wrapper i {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-pink) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 {
            font-size: 5rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, var(--primary-blue) 30%, var(--secondary-pink) 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        h2 {
            font-size: 2rem;
            font-weight: 600;
            color: var(--primary-blue);
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.1rem;
            color: #4a4a4a;
            margin-bottom: 2rem;
        }

        .btn-custom {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-pink) 100%);
            border: none;
            color: white;
            font-weight: 500;
            text-transform: uppercase;
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(8, 13, 107, 0.3);
            text-decoration: none;
            display: inline-block;
        }

        .btn-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(237, 17, 96, 0.4);
            color: white;
        }

        .divider {
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-blue), var(--secondary-pink));
            border-radius: 2px;
            margin: 1.5rem auto;
        }

        /* Адаптивность как в оригинале */
        @media (max-width: 768px) {
            .construction-card {
                padding: 2rem 1.5rem;
            }
            
            h1 {
                font-size: 4rem;
            }
            
            h2 {
                font-size: 1.6rem;
            }
            
            .icon-wrapper {
                font-size: 4rem;
            }
        }

        @media (max-width: 576px) {
            h1 {
                font-size: 3.2rem;
            }
            
            h2 {
                font-size: 1.4rem;
            }
            
            p {
                font-size: 1rem;
            }
            
            .btn-custom {
                padding: 12px 30px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 375px) {
            h1 {
                font-size: 2.8rem;
            }
            
            .icon-wrapper {
                font-size: 3.5rem;
            }
        }

        /* Стили для декоративных элементов в духе основной страницы */
        .geometric-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: -1;
        }

        .geometric-shape {
            position: absolute;
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-pink) 100%);
            opacity: 0.1;
            border-radius: 30px;
            transform: rotate(45deg);
        }

        .shape1 {
            top: -50px;
            right: -50px;
        }

        .shape2 {
            bottom: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
        }
    </style>
</head>
<body>
    <!-- Декоративные элементы как на основной странице -->
    <div class="geometric-bg">
        <div class="geometric-shape shape1"></div>
        <div class="geometric-shape shape2"></div>
    </div>

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="construction-card text-center">
            <div class="icon-wrapper">
                <i class="bi bi-cone-striped"></i> 
                <!-- Альтернативы: bi-bricks, bi-hammer, bi-tools -->
            </div>
            
            <h1>404</h1>
            <h2>Страница в разработке</h2>
            
            <div class="divider"></div>
            
            <p class="px-md-4">
                Этот раздел скоро наполнится полезной информацией.<br>
                А пока вы можете вернуться на главную или изучить другие направления.
            </p>
            
            <a href="index.html" class="btn-custom">
                <i class="bi bi-arrow-left me-2"></i>На главную
            </a>
            
            <div class="mt-4 text-muted" style="font-size: 0.85rem;">
                * Мы работаем над содержимым. Спасибо за понимание!
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (для интерактивности, если потребуется, но не обязательно) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
