<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Academy/css/owl.carousel.css">
    <link rel="stylesheet" href="Academy/css/owl.theme.default.min.css">
    <link rel="stylesheet" href="Academy/css/owl.theme.green.css">
    <link rel="stylesheet" href="https://unpkg.com/@coreui/coreui/dist/css/coreui.min.css">
    <link href="/Academy/css/style.css" rel="stylesheet">
    <title>Аспирантура | ААИ ЮФУ</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Montserrat Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <style>
        /* ===== БАЗОВЫЕ СТИЛИ И ПЕРЕМЕННЫЕ ===== */
        :root {
            --primary-blue: #080D6B;
            --secondary-pink: #ED1160;
            --dark-grey: #232328;
            --medium-grey: #777777;
            --light-grey: #f3f3f3;
            --white: #ffffff;
            --black: #000000;
            --gradient-primary: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-pink) 100%);
            --gradient-dark: linear-gradient(45deg, #131313, var(--primary-blue));
        }

        /* ===== ОБЩИЕ СТИЛИ ===== */
        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--black);
            line-height: 1.6;
        }

        /* Типографика */
        h1, h2, h3, h4, h5, h6 {
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .hero-title {
            font-size: 80px;
            font-weight: 500;
            text-transform: uppercase;
            line-height: 1.1;
            margin-bottom: 30px;
        }

        .hero-subtitle {
            font-size: 16px;
            font-weight: 400;
            line-height: 1.6;
        }

        .section-title {
            font-size: 40px;
            font-weight: 500;
            text-transform: uppercase;
            line-height: 1.3;
            margin-bottom: 40px;
        }

        .section-subtitle {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.4;
            text-transform: uppercase;
        }

        /* ===== СЕКЦИИ ===== */
        section {
            padding: 80px 0;
        }

        .directors-section {
            background: var(--gradient-dark);
            color: var(--white);
        }

        /* ===== КАРТОЧКИ ===== */
        .program-card {
            background: var(--primary-blue);
            border: none;
            border-radius: 15px;
            color: var(--white);
            height: 100%;
        }

        .director-card {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            height: 100%;
        }

        .director-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .director-photo {
            border-radius: 10px;
            overflow: hidden;
            height: 200px;
            background-size: cover;
            background-position: center;
        }

        .director-link {
            color: var(--black);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .director-link:hover {
            color: var(--primary-blue);
        }

        /* ===== КНОПКИ И ССЫЛКИ ===== */
        .btn {
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .btn-lg {
            padding: 15px 30px;
            font-size: 16px;
        }

        .btn-primary {
            background: var(--gradient-primary);
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(8, 13, 107, 0.3);
        }

        .btn-outline-light {
            border-width: 2px;
        }

        .btn-outline-light:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .document-link {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--black);
        }

        .document-link:hover {
            border-color: var(--primary-blue);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(8, 13, 107, 0.1);
        }

        /* ===== ТАБЛИЦЫ ===== */
        .admission-table {
            background: var(--primary-blue);
            border-radius: 15px;
            color: var(--white);
            padding: 30px;
        }

        .table-title {
            font-size: 20px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .table-divider {
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            margin: 20px 0;
        }

        /* ===== АККОРДЕОНЫ ===== */
        .accordion-button {
            font-size: 22px;
            font-weight: 600;
            padding: 28px;
            border-radius: 15px !important;
            background: var(--white);
            color: var(--black);
        }

        .accordion-button:not(.collapsed) {
            background: var(--white);
            color: var(--black);
            box-shadow: none;
        }

        .accordion-button:focus {
            box-shadow: none;
            border-color: #D2D2D2;
        }

        .accordion-button::after {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%23000'%3e%3cpath fill-rule='evenodd' d='M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z'/%3e%3c/svg%3e");
        }

        .accordion-item {
            border: none;
            margin-bottom: 20px;
        }

        .accordion-body {
            padding: 28px;
            border-top: none;
            border-radius: 0 0 15px 15px;
        }

        /* ===== ГРАФИКА ===== */
        .hero-graphic {
            position: relative;
            height: 456px;
        }

        .graphic-container {
            height: 100%;
        }

        /* ===== АДАПТИВНОСТЬ ===== */

        /* Большие десктопы (≥1400px) */
        @media (min-width: 1400px) {
            .hero-title {
                font-size: 100px;
            }
            
            .section-title {
                font-size: 48px;
            }
        }

        /* Планшеты (≤992px) */
        @media (max-width: 992px) {
            .hero-title {
                font-size: 60px;
            }
            
            .section-title {
                font-size: 36px;
            }
            
            section {
                padding: 60px 0;
            }
            
            .director-card {
                margin-bottom: 30px;
            }
        }

        /* Планшеты (≤768px) */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 48px;
                text-align: center;
            }
            
            .hero-subtitle {
                text-align: center;
                margin: 0 auto 40px;
            }
            
            .section-title {
                font-size: 32px;
                text-align: center;
            }
            
            .btn-lg {
                padding: 12px 24px;
                font-size: 15px;
            }
        }

        /* Мобильные (≤576px) */
        @media (max-width: 576px) {
            .hero-title {
                font-size: 36px;
            }
            
            .hero-subtitle {
                font-size: 14px;
            }
            
            .section-title {
                font-size: 28px;
            }
            
            .section-subtitle {
                font-size: 18px;
            }
            
            section {
                padding: 40px 0;
            }
            
            .director-photo {
                height: 150px;
            }
            
            .accordion-button {
                font-size: 18px;
                padding: 20px;
            }
        }

        /* Очень маленькие мобильные (≤375px) */
        @media (max-width: 375px) {
            .hero-title {
                font-size: 32px;
            }
            
            .section-title {
                font-size: 24px;
            }
            
            .btn-lg {
                padding: 10px 20px;
                font-size: 14px;
            }
        }

        /* ===== УТИЛИТЫ ===== */
        .text-pink {
            color: var(--secondary-pink) !important;
        }

        .bg-primary {
            background: var(--primary-blue) !important;
        }

        .bg-light-info {
            background-color: rgba(8, 13, 107, 0.05) !important;
        }

        .hover-lift {
            transition: transform 0.2s ease;
        }

        .hover-lift:hover {
            transform: translateY(-4px);
        }

        /* ===== АНИМАЦИИ ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in-up {
            animation: fadeInUp 0.6s ease forwards;
        }
    </style>
</head>


   <section id="end">
 <div id="footer-placeholder"></div>
    </section>

      <!-- Подключаем Bootstrap JS и Popper.js -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
    <script src="/Academy/js/owl.carousel.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/@coreui/coreui/dist/js/coreui.bundle.min.js"></script>
    <script src="/Academy/js/common.js"></script>
    <script src="/Academy/js/tabs.js"></script>
    <script src="/Academy/js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script>
        // Активация всплывающих подсказок
        document.addEventListener('DOMContentLoaded', function() {
            // Инициализация Bootstrap компонентов
            var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
            var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
                return new bootstrap.Tooltip(tooltipTriggerEl);
            });
            
            // Анимация при скролле
            function animateOnScroll() {
                var elements = document.querySelectorAll('.director-card, .document-link');
                
                elements.forEach(function(element) {
                    var elementTop = element.getBoundingClientRect().top;
                    var elementVisible = 150;
                    
                    if (elementTop < window.innerHeight - elementVisible) {
                        element.classList.add('fade-in-up');
                    }
                });
            }
            
            window.addEventListener('scroll', animateOnScroll);
            animateOnScroll(); // Инициализация при загрузке
        });
    </script>
</body>
</html>
