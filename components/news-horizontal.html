<!-- Стили для горизонтальной секции новостей -->
<style>
    .section-title {
        font-size: 40px;
        font-weight: 500;
        text-transform: uppercase;
        line-height: 1.3;
        margin-bottom: 40px;
    }

    .news-date {
        font-size: 16px;
        color: var(--grey-dark, #8C8C8C);
        margin-bottom: 10px;
    }

    .news-title {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 15px;
    }

    .news-description {
        font-size: 16px;
        font-weight: 400;
        line-height: 1.4;
    }

    .news-link {
        display: inline-flex;
        align-items: center;
        gap: 15px;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        color: var(--black, #000);
        margin-top: 15px;
    }

    .news-link-arrow {
        width: 26px;
        height: 8px;
        background-image: url("data:image/svg+xml,%3Csvg width='26' height='8' viewBox='0 0 26 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M25.3536 4.35355C25.5488 4.15829 25.5488 3.84171 25.3536 3.64645L22.1716 0.464466C21.9763 0.269204 21.6597 0.269204 21.4645 0.464466C21.2692 0.659728 21.2692 0.976311 21.4645 1.17157L24.2929 4L21.4645 6.82843C21.2692 7.02369 21.2692 7.34027 21.4645 7.53553C21.6597 7.7308 21.9763 7.7308 22.1716 7.53553L25.3536 4.35355ZM0 4.5H25V3.5H0V4.5Z' fill='black'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: center;
    }

    .news-card {
        margin-bottom: 40px;
    }

    .news-image {
        width: 353px;
        height: 201px;
        border-radius: 15px;
        background-size: cover;
        background-position: center;
    }

    .events-carousel .owl-nav {
        position: absolute;
        top: -80px;
        right: 0;
    }

    .events-carousel .owl-nav button {
        margin: 0 10px !important;
    }

    .events-carousel .owl-nav button span {
        font-size: 48px;
        line-height: 1;
    }

    .events-carousel .owl-stage {
        display: flex;
    }

    @media (max-width: 1400px) {
        .section-title { font-size: 36px; }
    }

    @media (max-width: 1200px) {
        .section-title { font-size: 32px; }
    }

    @media (max-width: 992px) {
        .section-title { font-size: 28px; }
        .news-image {
            width: 100%;
            max-width: 353px;
        }
    }

    @media (max-width: 768px) {
        .section-title {
            font-size: 24px;
            text-align: center;
        }
        .news-card {
            text-align: center;
        }
        .news-image {
            margin: 0 auto 20px;
        }
    }

    @media (max-width: 576px) {
        .section-title { font-size: 20px; }
    }
</style>

<section class="news-section-horizontal py-5">
    <div class="container">
        <h2 class="section-title offset-1 text-primary mb-5 text-white">ближайшие события</h2>
        
        <div class="events-carousel-wrapper offset-1">
            <div class="owl-carousel owl-theme" id="news-horizontal-carousel"></div>
        </div>
    </div>
</section>

<script>
// Ждём загрузки всего необходимого
function initHorizontalNews() {
    console.log('=== initHorizontalNews ===');
    
    const carousel = document.getElementById('news-horizontal-carousel');
    if (!carousel) {
        console.error('Carousel container not found');
        return;
    }
    
    // Проверяем данные
    if (typeof NEWS_DATA === 'undefined') {
        console.log('NEWS_DATA not ready, waiting...');
        setTimeout(initHorizontalNews, 100);
        return;
    }
    
    console.log('NEWS_DATA found, items:', NEWS_DATA.news.length);
    
    // Очищаем и заполняем карусель
    carousel.innerHTML = '';
    
    const itemsToShow = NEWS_DATA.news.slice(0, 4);
    
    itemsToShow.forEach(item => {
        const card = document.createElement('div');
        card.className = 'news-card';
        card.innerHTML = `
            <div class="row">
                <div class="col-md-12">
                    <div class="news-image" style="background-image: url('${item.image}');"></div>
                </div>
                <div class="col-md-12">
                    <div class="news-date">${item.date}</div>
                    <h3 class="news-title">${item.title}</h3>
                    <p class="news-description">${item.description}</p>
                </div>
                <div class="col-md-12">
                    <a href="${item.link}" class="news-link">
                        Подробнее
                        <span class="news-link-arrow"></span>
                    </a>
                </div>
            </div>
        `;
        carousel.appendChild(card);
    });
    
    console.log('Cards added to carousel:', carousel.children.length);
    
    // Инициализируем Owl Carousel
    if (typeof $ === 'undefined') {
        console.log('jQuery not ready, waiting...');
        setTimeout(initHorizontalNews, 100);
        return;
    }
    
    if (!$.fn.owlCarousel) {
        console.log('OwlCarousel not ready, waiting...');
        setTimeout(initHorizontalNews, 100);
        return;
    }
    
    // Уничтожаем если уже инициализирована
    if ($(carousel).hasClass('owl-loaded')) {
        $(carousel).trigger('destroy.owl.carousel');
    }
    
    // Убираем лишние классы Owl Carousel
    carousel.classList.remove('owl-loaded', 'owl-drag', 'owl-carousel');
    carousel.classList.add('owl-carousel', 'owl-theme');
    
    console.log('Initializing Owl Carousel...');
    
    $(carousel).owlCarousel({
        loop: true,
        margin: 20,
        nav: true,
        dots: false,
        navText: ['‹', '›'],
        responsive: {
            0: { items: 1 },
            768: { items: 2 },
            992: { items: 2.2 },
            1200: { items: 3.2 }
        },
        onInitialized: function(event) {
            console.log('Owl Carousel initialized! Items:', event.item.count);
        },
        onRefreshed: function() {
            console.log('Owl Carousel refreshed');
        }
    });
    
    console.log('Owl Carousel call completed');
}

// Запускаем с задержкой для гарантии загрузки всего
setTimeout(initHorizontalNews, 200);
// И ещё раз на всякий случай
setTimeout(initHorizontalNews, 500);
</script>
